set -g status-style 'bg=#333333 fg=#5eacd3'
set -g status-right ""

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm*:RGB,alacritty*:RGB,wezterm*:RGB"

set -g status on
set -g mouse on
set-window-option -g mode-keys vi
set -g focus-events on
set -g detach-on-destroy off

set -g history-limit 5000
set -s escape-time 0

# start windows and panes index at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# make sure windows get renumbered after delete
set -g renumber-windows on

# tail of path as window name
set -g status-interval 5
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# set C-a as tmux prefix
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# keymap to reload tmux config
bind r source-file ~/.tmux.conf \; display ".tmux.conf sourced"

# unbind " and % bc they're not used to split windows but | and - are
unbind '"'
unbind %

# split panes using | and -, make sure they open in the same path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# open new window at current path
bind C new-window -c "#{pane_current_path}"

# Prefix+t toggles a persistent popup shell
bind-key t if-shell -F '#{==:#{session_name},popup-shell}' \
  'detach-client' \
  'display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "/home/chris/.local/scripts/tmux-popup-shell"'

# open lazygit in popup window in current directory
bind-key T display-popup -d "#{pane_current_path}" -w 95% -h 95% -E lazygit

# keymap to start tmux-sessionizer
# bind-key -r E run-shell "tmux neww ~/bin/tmux-sessionizer
# bind-key -r E run-shell "tmux neww ~/.local/scripts/tmux-sessionizer.sh"
# bind-key -r R run-shell "tmux new-window tmux-sessionizer -s 0"

# List of tmux plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# set-environment -g TMUX_PLUGIN_MANAGER_PATH="~/.tmux/tpm-plugins"

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'
